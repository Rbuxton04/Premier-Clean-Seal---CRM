services:
  - type: web
    name: premier-crm
    runtime: node
    plan: free
    buildCommand: npm install --legacy-peer-deps && npx prisma db push --accept-data-loss && npm run db:seed && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: premier-crm-db, property: connectionString }
      - key: NODE_VERSION
        value: 20.17.0

databases:
  - name: premier-crm-db
    plan: free
